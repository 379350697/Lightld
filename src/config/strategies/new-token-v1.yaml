strategyId: new-token-v1
poolClass: new-token
exitMint: SOL
lpConfig:
  enabled: true
  singleSideMint: SOL
  strategyType: bid-ask
  downsideCoveragePct: 66
  stopLossNetPnlPct: 20
  takeProfitNetPnlPct: 30
  solDepletionExitBins: 60
  minBinStep: 80
  minVolume24hUsd: 100000
  minFeeTvlRatio24h: 0
  claimFeeThresholdUsd: 25
  rebalanceOnOutOfRange: false
auxiliarySignals:
  enabled: true
  mode: rank-only
  timeoutMs: 800
  cacheTtlMs: 300000
  maxCandidatesPerCycle: 30
  failOpen: true
  maxScoreBonus: 30
  providers:
    - dexscreener
    - jupiter
    - coingecko
  providerOptions:
    dexscreener:
      enabled: true
      weight: 1
    jupiter:
      enabled: true
      weight: 1
      apiKeyEnv: JUPITER_API_KEY
    coingecko:
      enabled: true
      weight: 1
      apiKeyEnv: COINGECKO_API_KEY
hardGates:
  requireSolRoute: true
  minLiquidityUsd: 1000
filters:
  minLiquidityUsd: 1000
riskThresholds:
  maxPositionSol: 0.5
  maxDailyLossSol: 1
sessionWindows:
  - start: "00:00"
    end: "23:59"
solRouteLimits:
  maxSlippageBps: 100
  maxImpactBps: 200
live:
  enabled: true
  maxLivePositionSol: 0.15
  autoFlattenRequired: true
  maxHoldHours: 8
  minCloseToOpenIntervalSeconds: 120
